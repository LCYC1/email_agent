name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install poetry
      run: pip install poetry

    - name: Install dependencies
      run: poetry install --no-root

    - name: Run tests
      run: poetry run pytest --cov=src --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/email-agent:v1.${{ github.run_number }}
          ${{ secrets.DOCKER_USERNAME }}/email-agent:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: projects/11672584212/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
        service_account: github-actions@project-3af8d800-f8e7-4002-bcb.iam.gserviceaccount.com

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Update K8s deployment
      run: |
        gcloud container clusters get-credentials email-agent-cluster --zone europe-west1 --project project-3af8d800-f8e7-4002-bcb
        kubectl set image deployment/email-agent \
          email-agent=${{ secrets.DOCKER_USERNAME }}/email-agent:v1.${{ github.run_number }} \
          -n default
        kubectl rollout status deployment/email-agent -n default
